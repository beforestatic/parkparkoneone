services:

  # ── 1. Navigator — FastAPI occupancy API ─────────────────────────────────
  navigator:
    build:
      context: ./navigator
      dockerfile: Dockerfile
    ports:
      - "9000:9000"
    env_file: .env
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:9000/health"]
      interval: 5s
      timeout: 3s
      retries: 10
      start_period: 5s
    restart: unless-stopped

  # ── 2. GUI server — Flask camera / detection server ───────────────────────
  gui_server:
    build:
      context: ./scripts/parking_detector
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    env_file: .env
    command: ["python", "gui_server.py", "--mode", "mock"]
    depends_on:
      navigator:
        condition: service_healthy
    restart: unless-stopped

  # ── 3. Frontend — Vite dev server ─────────────────────────────────────────
  frontend:
    build:
      context: .
      dockerfile: Dockerfile.frontend
    ports:
      - "5173:5173"
    env_file: .env
    depends_on:
      navigator:
        condition: service_healthy
    restart: unless-stopped
